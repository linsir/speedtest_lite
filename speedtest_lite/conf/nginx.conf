master_process on;
worker_processes 1;
worker_cpu_affinity auto;
error_log logs/error.log error;

worker_rlimit_nofile 20480;
worker_rlimit_core 100M;
working_directory /tmp/;
worker_shutdown_timeout 3;

events {
    accept_mutex off;
    worker_connections 10620;
}




http {
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js mjs;
        application/json                      json;
        image/x-icon                          ico;
        image/svg+xml                         svg;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/gif                             gif;
        application/octet-stream              bin;
    }
    default_type  application/octet-stream;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 60;
    client_header_buffer_size 4k;
    client_max_body_size 100m;
    more_set_headers 'Server: OpenResty Server';

    gzip off;
    gzip_vary off;
    lua_package_path  "$prefixdeps/share/lua/5.1/?.lua;$prefixdeps/share/lua/5.1/?.lua;$prefixlua/?.lua;;";
    lua_package_cpath "$prefixdeps/lib64/lua/5.1/?.so;$prefixdeps/lib/lua/5.1/?.so;;";


    lua_code_cache on;
    log_not_found off;
    resolver ipv6=off local=on;
    resolver_timeout 5;

    client_body_temp_path runtime/client_body_temp;
    fastcgi_temp_path runtime/fastcgi_temp;
    proxy_temp_path runtime/proxy_temp;
    scgi_temp_path runtime/scgi_temp;
    uwsgi_temp_path runtime/uwsgi_temp;

    lua_ssl_verify_depth 5;
    ssl_session_timeout 86400;
    lua_socket_log_errors off;

    include conf.d/*.conf;
    server {
        listen 80;
        listen 8008;
        server_name _;
        # access_log off;

        # Modern iSpeedTest UI (default)
        location / {
            root html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Legacy v1 Chinese UI
        location /v1/ {
            alias html/v1/;
            index index.html;
        }

        # Speed test backend (Lua) — WebSocket upgrade for /backend/ws
        location ~ ^/backend/ws$ {
            lua_check_client_abort on;
            content_by_lua_block {
                require "resty.core"
                local app = require("app")
                app:run()
            }
        }

        location ~ ^/backend {
            content_by_lua_block {
                require "resty.core"
                local app = require("app")
                app:run()
            }
        }
    }
}



